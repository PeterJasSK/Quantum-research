<title>Quantum Tree</title>
<style>
  :root{
    --bg:#07100c; --bg2:#0c1a12; --fg:#eafff2; --dim:#7fae95;
    --accent:#6dffb0; --accent2:#ffd66d; --panel:rgba(255,255,255,.05);
    --line:rgba(255,255,255,.12);
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#e9f6ee; --bg2:#d3ecdd; --fg:#0f2418; --dim:#48705b;
           --accent:#159c5c; --accent2:#b8860b; --panel:rgba(0,0,0,.04);
           --line:rgba(0,0,0,.14); }
  }
  :root[data-theme="dark"]{ --bg:#07100c; --bg2:#0c1a12; --fg:#eafff2; --dim:#7fae95;
    --accent:#6dffb0; --accent2:#ffd66d; --panel:rgba(255,255,255,.05); --line:rgba(255,255,255,.12); }
  :root[data-theme="light"]{ --bg:#e9f6ee; --bg2:#d3ecdd; --fg:#0f2418; --dim:#48705b;
    --accent:#159c5c; --accent2:#b8860b; --panel:rgba(0,0,0,.04); --line:rgba(0,0,0,.14); }

  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       color:var(--fg);background:radial-gradient(120% 120% at 50% 0%,var(--bg2),var(--bg));
       min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;max-width:900px;padding:18px 20px 4px;display:flex;
         align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;margin:0;letter-spacing:.5px;font-weight:650}
  .sub{color:var(--dim);font-size:12.5px}
  .stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/11;
         margin:8px 0;border-radius:16px;overflow:hidden;
         box-shadow:0 20px 60px rgba(0,0,0,.35), inset 0 0 0 1px var(--line)}
  canvas{display:block;width:100%;height:100%}
  .hud{position:absolute;left:14px;top:12px;font-size:12px;color:var(--dim);
       letter-spacing:.4px;user-select:none;pointer-events:none;
       text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .hud b{color:var(--fg);font-weight:600}
  .env{position:absolute;right:14px;top:12px;font-size:11px;color:var(--dim);
       letter-spacing:1px;text-transform:uppercase;text-align:right;
       text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .controls{width:100%;max-width:900px;padding:6px 20px 26px;
            display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  button{background:var(--panel);color:var(--fg);border:1px solid var(--line);
         border-radius:10px;padding:9px 15px;font-size:13px;cursor:pointer;transition:.15s}
  button:hover{border-color:var(--accent)}
  input[type=range]{flex:1;min-width:180px;accent-color:var(--accent)}
  .file{color:var(--dim);font-size:12px}
  label.file b{color:var(--accent);cursor:pointer;text-decoration:underline}
  input[type=file]{display:none}
  .barwrap{position:absolute;left:14px;bottom:14px;right:14px;height:4px;
           background:var(--line);border-radius:3px;overflow:hidden}
  .bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
       transition:width .3s}
</style>

<header>
  <h1>Quantum&nbsp;Tree</h1>
  <span class="sub" id="src">demo tree — synthetic genome (load a run.json to grow a real one)</span>
</header>

<div class="stage">
  <canvas id="c"></canvas>
  <div class="hud">growth <b id="gen">0</b> / <span id="gtot">0</span></div>
  <div class="env" id="env">season · wind</div>
  <div class="barwrap"><div class="bar" id="dbar" style="width:0%"></div></div>
</div>

<div class="controls">
  <button id="play">⏸ pause</button>
  <input type="range" id="scrub" min="0" max="0" value="0" step="0.01">
  <label class="file"><b>load run.json</b><input type="file" id="file" accept=".json,application/json"></label>
</div>

<script>
"use strict";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
const $ = id => document.getElementById(id);

let DATA = null, SPEC = null, TREE = null;
let playing = true, genPos = 0, t0 = performance.now();

/* ---------- genome decode (mirror of code/genome.py) ---------- */
function bitsToInt(bits, idxs){
  let v = 0;
  for(const i of idxs) v = (v<<1) | ((i<bits.length && bits[i]==="1")?1:0);
  return v;
}
function decodeSlot(sb){
  const angle = bitsToInt(sb,[0,1]), length = bitsToInt(sb,[2,3]);
  return {
    bend:   angle/3*2 - 1,          // -1..+1
    length: 0.4 + length/3*0.6,     // 0.4..1.0
    fork:   (sb.length>4 && sb[4]==="1") ? 1 : 0,
    leaf:   (sb.length>5 && sb[5]==="1") ? 1 : 0,
  };
}
function decodeField(bits, spec){
  const sb = spec.slot_bits, ns = spec.n_slots, out = [];
  for(let s=0; s<ns; s++) out.push(decodeSlot(bits.slice(s*sb,(s+1)*sb)));
  return out;
}

/* ---------- grow the whole tree once, tagging each segment with the growth
   step it was born on (viewer reveals + animates by genPos) ---------- */
const MAXBEND = 0.55, FORK = 0.6, BASELEN = 1.0, MAXDEPTH = 24, MAXTIPS = 90;
const FORK_GAP = 2;   // a lineage may not fork again for this many levels
const UP = 0.08;   // gravitropism: GENTLE pull toward vertical (compounds every
                   // step, so keep small or the whole tree collapses to a stick)

// nudge a heading a little toward straight up (-PI/2), so the tree trends up
// without erasing the branch spread
function upright(h){ return h + UP*(-Math.PI/2 - h); }

function greenLeaf(x2,y2,g,depth,season){
  return {x:x2, y:y2, gen:g, depth:depth,
          hue: 90 + season*32,        // yellow-green (dry) .. green (good)
          sat: 45 + season*40};
}

function buildTree(data){
  const spec = data.meta.genome_spec, gens = data.generations;
  const segs = [], leaves = [];
  let tips = [{x:0, y:0, heading:-Math.PI/2, depth:0, fk:-9}];

  for(let g=0; g<gens.length; g++){
    const field = decodeField(gens[g].bits, spec);
    const env = gens[g].env || {};
    const season = (env.season!=null) ? env.season : 0.7;
    const windLean = (env.wind||0)*0.22 + (env.light_side||0)*0.05;
    const alive = tips.filter(t=>t.depth<MAXDEPTH).slice(0, MAXTIPS);
    const next = [];
    for(let k=0;k<alive.length;k++){
      // rotate slot per generation so branching is NOT hostage to slot 0 (the
      // trunk would otherwise read the same bit every step and never fork)
      const t = alive[k], slot = field[(k + g) % field.length];
      const heading = upright(t.heading + slot.bend*MAXBEND + windLean);
      const len = BASELEN * slot.length * (0.5 + 0.7*season);
      const x2 = t.x + Math.cos(heading)*len, y2 = t.y + Math.sin(heading)*len;
      segs.push({x1:t.x, y1:t.y, x2, y2, gen:g, depth:t.depth, hue: 95 + season*35});
      // leaf bit -> a green leaf cluster (not on the trunk); branch keeps growing
      if(slot.leaf && t.depth >= 3) leaves.push(greenLeaf(x2, y2, g, t.depth, season));
      if(t.depth >= MAXDEPTH-1){
        // only real death: hit the depth cap -> cap it with leaves
        leaves.push(greenLeaf(x2, y2, g, t.depth, season));
      } else {
        // fork only if the bit is set AND this lineage hasn't forked recently
        // (spacing keeps it readable), or force the very first split off the seed
        const forkNow = (slot.fork && (t.depth - t.fk) >= FORK_GAP) || t.fk === -9;
        next.push({x:x2, y:y2, heading, depth:t.depth+1, fk: forkNow ? t.depth : t.fk});
        if(forkNow) next.push({x:x2, y:y2,
          heading: heading + (k%2 ? FORK : -FORK), depth:t.depth+1, fk: t.depth});
      }
    }
    tips = next;
    if(!tips.length) break;   // (rare) nothing left to grow
  }
  // fit virtual coords -> unit box info for later screen mapping
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  const acc = pt => { if(pt.x<minX)minX=pt.x; if(pt.x>maxX)maxX=pt.x;
                      if(pt.y<minY)minY=pt.y; if(pt.y>maxY)maxY=pt.y; };
  for(const s of segs){ acc({x:s.x1,y:s.y1}); acc({x:s.x2,y:s.y2}); }
  for(const l of leaves) acc(l);
  if(minX>maxX){ minX=maxX=minY=maxY=0; }
  return {segs, leaves, minX, maxX, minY, maxY};
}

/* ---------- render ---------- */
function frame(now){
  const dt = (now - t0)/1000; t0 = now;
  const W = cv.width, H = cv.height;
  // sky
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, getCss("--bg2")); sky.addColorStop(1, getCss("--bg"));
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  if(!DATA || !TREE){ requestAnimationFrame(frame); return; }
  const gens = DATA.generations, G = gens.length;
  if(playing) genPos = (genPos + dt*0.55) % (G+2);   // pause ~2 steps at full grown
  $("scrub").value = Math.min(genPos, G-1);
  const shown = Math.min(genPos, G-1);
  const gi = Math.min(Math.floor(shown), G-1);
  const env = gens[gi].env || {};

  // screen fit (leave room, root near ground)
  const pad = 0.10;
  const tw = (TREE.maxX-TREE.minX)||1, th = (TREE.maxY-TREE.minY)||1;
  const s = Math.min(W*(1-2*pad)/tw, H*(1-2*pad)/th);
  const groundY = H*(1-pad);
  const ox = W/2 - ((TREE.minX+TREE.maxX)/2)*s;
  const oy = groundY - TREE.maxY*s;              // maxY (~0, the root) sits at ground
  const treeTop = oy + TREE.minY*s, treeH = (groundY - treeTop)||1;

  // wind sway: taller = sways more (h^2). Amount from current step's wind.
  const windAmp = (8 + Math.abs(env.wind||0)*26) * (s/60);
  const wdir = Math.sign(env.wind||0.001) || 1;
  const swayX = (x,y) => {
    const h = Math.max(0, Math.min(1, (groundY - y)/treeH));
    return x + wdir*Math.sin(now*0.0016 + h*3.0)*windAmp*h*h;
  };

  // ground
  ctx.strokeStyle = getCss("--line"); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();

  // shimmer: faint alternate branch tips of the currently-growing step
  const div = gens[gi].diversity || 0;
  if(genPos < G && (gens[gi].samples||[]).length){
    drawShimmer(gens[gi], gi, ox, oy, s, swayX, div);
  }

  // branches -- reveal by birth step, newest step sprouts in over its fraction
  const gf = shown - Math.floor(shown);
  for(const seg of TREE.segs){
    if(seg.gen > gi) continue;
    const grow = (seg.gen === gi) ? gf : 1;         // sprout animation
    const x1=ox+seg.x1*s, y1=oy+seg.y1*s;
    let x2=ox+seg.x2*s, y2=oy+seg.y2*s;
    x2 = x1+(x2-x1)*grow; y2 = y1+(y2-y1)*grow;
    const sx1=swayX(x1,y1), sy1=y1, sx2=swayX(x2,y2), sy2=y2;
    const lw = Math.max(1, (MAXDEPTH-seg.depth)*0.55*(s/55));
    // trunk brown -> branch green with depth
    const f = Math.min(1, seg.depth/8);
    const hue = 28 + f*(seg.hue-28), lgt = 26 + f*22, sat = 45 - f*10;
    ctx.strokeStyle = `hsl(${hue} ${sat}% ${lgt}%)`;
    ctx.lineWidth = lw; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
  }

  // leaves
  for(const lf of TREE.leaves){
    if(lf.gen > gi) continue;
    const grow = (lf.gen===gi) ? gf : 1;
    if(grow < 0.4) continue;
    const x=ox+lf.x*s, y=oy+lf.y*s;
    const sx=swayX(x,y)+Math.sin(now*0.003+lf.x*3)*1.5;
    const r = (2.2 + lf.depth*0.15)*(s/55)*Math.min(1,grow*1.5);
    ctx.fillStyle = `hsla(${lf.hue} ${lf.sat}% 55% 0.92)`;
    ctx.beginPath(); ctx.ellipse(sx, y, r*1.3, r, 0.5, 0, 7); ctx.fill();
  }

  // HUD
  $("gen").textContent = gi;
  const seasonWord = (env.season>0.66)?"good season":(env.season<0.34)?"dry season":"mild season";
  const windWord = Math.abs(env.wind||0)<0.15 ? "calm" :
                   (env.wind>0?"wind →":"← wind");
  $("env").textContent = `${seasonWord} · ${windWord}`;
  $("dbar").style.width = (div*100).toFixed(0)+"%";
  requestAnimationFrame(frame);
}

function drawShimmer(gen, gi, ox, oy, s, swayX, div){
  // grow a ghost tree from ONE alternate sampled field, faintly, to hint at the
  // superposition the branch collapsed out of.
  const alt = gen.samples[0]; if(!alt) return;
  const field = decodeField(alt, SPEC);
  const env = gen.env||{};
  const season = env.season!=null?env.season:0.7;
  const windLean = (env.wind||0)*0.22;
  let tips=[{x:0,y:0,heading:-Math.PI/2,depth:0,fk:-9}];
  ctx.strokeStyle = `hsla(150 80% 70% ${0.05+0.12*div})`;
  ctx.lineWidth = 1; ctx.lineCap="round";
  for(let g=0; g<=gi; g++){
    const alive=tips.filter(t=>t.depth<MAXDEPTH).slice(0,MAXTIPS); const next=[];
    for(let k=0;k<alive.length;k++){
      const t=alive[k], slot=field[(k+g)%field.length];
      const heading=upright(t.heading+slot.bend*MAXBEND+windLean);
      const len=BASELEN*slot.length*(0.5+0.7*season);
      const x2=t.x+Math.cos(heading)*len, y2=t.y+Math.sin(heading)*len;
      if(g===gi){
        const X1=swayX(ox+t.x*s,oy+t.y*s), X2=swayX(ox+x2*s,oy+y2*s);
        ctx.beginPath(); ctx.moveTo(X1,oy+t.y*s); ctx.lineTo(X2,oy+y2*s); ctx.stroke();
      }
      if(t.depth<MAXDEPTH-1){
        const forkNow=(slot.fork&&(t.depth-t.fk)>=FORK_GAP)||t.fk===-9;
        next.push({x:x2,y:y2,heading,depth:t.depth+1,fk:forkNow?t.depth:t.fk});
        if(forkNow) next.push({x:x2,y:y2,heading:heading+(k%2?FORK:-FORK),depth:t.depth+1,fk:t.depth});
      }
    }
    tips=next; if(!tips.length) break;
  }
}

function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v)||"#000"; }

/* ---------- sizing ---------- */
function size(){
  const r = cv.getBoundingClientRect(), dpr = Math.min(devicePixelRatio||1,2);
  cv.width = Math.max(1, Math.round(r.width*dpr));
  cv.height = Math.max(1, Math.round(r.height*dpr));
}
addEventListener("resize", size); size();

/* ---------- load ---------- */
function load(data, label){
  DATA = data; SPEC = data.meta.genome_spec; TREE = buildTree(data);
  $("gtot").textContent = data.generations.length-1;
  $("scrub").max = data.generations.length-1;
  genPos = 0; $("src").textContent = label;
}
$("file").addEventListener("change", ev=>{
  const f = ev.target.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = () => { try{
      const d = JSON.parse(fr.result), m = d.meta||{};
      load(d, `${m.backend||"?"}${m.sim?" (sim)":""} — ${m.generations||d.generations.length} steps, ${m.shots||"?"} shots`);
    }catch(e){ alert("could not read run.json: "+e.message); } };
  fr.readAsText(f);
});
$("play").addEventListener("click", ()=>{ playing=!playing;
  $("play").textContent = playing?"⏸ pause":"▶ play"; });
$("scrub").addEventListener("input", e=>{ playing=false;
  $("play").textContent="▶ play"; genPos=parseFloat(e.target.value); });

/* ---------- demo: a synthetic tree so the page is alive before a run loads ---------- */
function demo(){
  const spec = {n_bits:108, slot_bits:6, n_slots:18,
    slot_fields:{angle:{bits:[0,1]},length:{bits:[2,3]},fork:{bits:[4]},leaf:{bits:[5]}}};
  const n=108, G=13, shots=2048;
  let seed=987654; const rnd=()=>{ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; };
  const theta=Array.from({length:n},()=>Math.PI/2);
  const period=8, phase=1.1, windPeriod=6, wphase=0.7, light=1;
  const gens=[];
  for(let g=0; g<G; g++){
    const season=0.5+0.5*Math.sin(2*Math.PI*g/period+phase);
    const wind=0.6*Math.sin(2*Math.PI*g/windPeriod+wphase)+(rnd()-0.5)*0.3;
    // sample a field, biased so trees look plausible (more forks/length in good season)
    const mk=()=>{ let b="";
      for(let i=0;i<n;i++){ const loc=i%6; let p=Math.sin(theta[i]/2)**2;
        if(loc>=2&&loc<=4) p=p+0.3*(2*season-1);
        if(loc===4) p+=0.12;    // gentle fork bias (viewer spaces forks out)
        if(loc===5) p+=0.16;    // green leaves
        p=Math.min(0.95,Math.max(0.05,p));
        b+= rnd()<p?"1":"0"; } return b; };
    const bits=mk(), samples=[mk(),mk()];
    let ones=0; for(const ch of bits) if(ch==="1") ones++;
    const p1=ones/n; const div=(p1<=0||p1>=1)?0:(-p1*Math.log2(p1)-(1-p1)*Math.log2(1-p1));
    gens.push({gen:g, bits, samples, diversity:div,
               env:{season:+season.toFixed(3),wind:+wind.toFixed(3),light_side:light,
                    angle_bias:0,season_bias:0}});
    for(let i=0;i<n;i++) theta[i]=Math.min(Math.PI-0.1,Math.max(0.1,
        theta[i]+0.18*(bits[i]==="1"?1:-1)+(rnd()-0.5)*0.1));
  }
  return {meta:{project:"QuantumTree",backend:"demo",sim:true,generations:G,shots,genome_spec:spec},generations:gens};
}

load(demo(), "demo tree — synthetic genome (load a run.json to grow a real one)");
requestAnimationFrame(frame);
</script>
