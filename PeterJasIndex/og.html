<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    display: flex; align-items: center; gap: 60px;
    padding: 0 90px;
    font-family: "Inter", sans-serif;
    color: #e2e8f0;
    background:
      radial-gradient(circle at 78% 28%, rgba(0,170,255,0.28), transparent 55%),
      radial-gradient(circle at 20% 80%, rgba(0,170,255,0.14), transparent 50%),
      radial-gradient(circle at 50% 0%, #0a2540, #052e44 70%, #041c2b);
    overflow: hidden;
    position: relative;
  }
  /* faint grid */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,170,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,170,255,0.06) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(circle at 70% 40%, #000, transparent 75%);
  }
  .left { position: relative; z-index: 2; flex: 1; }
  .badge {
    width: 96px; height: 96px; border-radius: 50%;
    display: grid; place-items: center;
    background: #00aaff; color: #052e44;
    font-family: "Orbitron", sans-serif; font-weight: 700; font-size: 40px;
    box-shadow: 0 0 40px rgba(0,170,255,0.6);
    margin-bottom: 34px;
  }
  h1 {
    font-size: 92px; font-weight: 900; letter-spacing: -0.03em; line-height: 1;
    color: #f8fafc; text-shadow: 0 0 24px rgba(0,170,255,0.35);
  }
  h1 .accent { color: #00aaff; }
  .role {
    margin-top: 22px; font-size: 34px; font-weight: 700; color: #cfe9ff;
  }
  .role .dot { color: #00aaff; margin: 0 12px; }
  .tags {
    margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap;
    font-family: "JetBrains Mono", monospace; font-size: 20px;
  }
  .tags span {
    padding: 8px 18px; border-radius: 24px;
    border: 1px solid rgba(0,170,255,0.4);
    background: rgba(0,170,255,0.09); color: #bfe6ff;
  }
  .url {
    position: absolute; bottom: 46px; left: 90px; z-index: 2;
    font-family: "JetBrains Mono", monospace; font-size: 24px;
    color: #00aaff; letter-spacing: 1px;
  }
  /* right visual: atom logo — 3 intersecting elliptical orbits + nucleus */
  .atom { position: relative; width: 300px; height: 300px; z-index: 2; flex-shrink: 0; }
  .atom .orbit {
    position: absolute; top: 50%; left: 50%;
    width: 300px; height: 116px; margin: -58px -150px;
    border: 3px solid rgba(0,170,255,0.65);
    border-radius: 50%;
  }
  .atom .o1 { transform: rotate(0deg); }
  .atom .o2 { transform: rotate(60deg); }
  .atom .o3 { transform: rotate(120deg); }
  .atom .core {
    position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
    margin: -15px; border-radius: 50%; background: #00aaff;
    box-shadow: 0 0 40px 10px rgba(0,170,255,0.85);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="badge">PJ</div>
    <h1>Peter <span class="accent">Jaš</span></h1>
    <div class="role">Back-end Developer <span class="dot">·</span> Quantum Computing</div>
    <div class="tags">
      <span>PHP / Symfony</span>
      <span>AWS</span>
      <span>BA-developer</span>
      <span>Qiskit</span>
    </div>
  </div>
  <div class="atom">
    <div class="orbit o1"></div>
    <div class="orbit o2"></div>
    <div class="orbit o3"></div>
    <div class="core"></div>
  </div>
  <div class="url">peterjas.sk</div>
</body>
</html>
